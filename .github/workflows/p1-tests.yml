name: P1 Tests

on:
  push:
    paths:
      - "projects/p1-credit-risk-scorer/**"
      - ".github/workflows/p1-tests.yml"
  pull_request:
    paths:
      - "projects/p1-credit-risk-scorer/**"
      - ".github/workflows/p1-tests.yml"

jobs:
  test-p1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r projects/p1-credit-risk-scorer/requirements.txt

      - name: Run tests
        run: |
          cd projects/p1-credit-risk-scorer
          pytest tests -q
