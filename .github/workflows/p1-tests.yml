name: P1 Tests

on:
  push:
    paths:
      - "projects/p1-credit-risk-scorer/**"
      - ".github/workflows/p1-tests.yml"
  pull_request:
    paths:
      - "projects/p1-credit-risk-scorer/**"
      - ".github/workflows/p1-tests.yml"
  workflow_dispatch:

concurrency:
  group: p1-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-p1:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: projects/p1-credit-risk-scorer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: projects/p1-credit-risk-scorer/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -q
